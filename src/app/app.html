<div class="container">
  <div class="header-info" style="display: flex; justify-content: space-between; padding: 10px 0; color: #555; font-size: 0.9rem;">
    <span>🏢 <b>{{ tenCongTy }}</b></span>
    <span>📅 Ngày: <b>{{ ngayHienTai }}</b></span>
  </div>

  <h2 class="title-main">
    <span (click)="moTabQuanLy()" style="cursor: pointer;">📦</span> Quản Lý Kho Mini
  </h2>
  
  <div class="action-bar" *ngIf="currentTab === 'nhap'">
    <button (click)="exportToPDF()" class="btn-pdf-fancy">📊 Xuất Báo Cáo PDF</button>
    <button (click)="luuTatCa()" class="btn-save-all" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 10px;">
      💾 LƯU TẤT CẢ
    </button>
  </div>

  <div *ngIf="isLoading" style="text-align: center; padding: 20px;">⏳ Đang xử lý...</div>

  <div class="table-container" *ngIf="!isLoading && currentTab === 'nhap'">
    <table class="product-table">
      <thead>
        <tr>
          <th>Tên Sản Phẩm</th>
          <th>Giá</th>
          <th>Tồn Đầu</th>
          <th>Nhập</th>
          <th>Kiểm</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let sp of dsSanPham">
          <td class="product-name">{{ sp.name }}</td>
          <td class="cell-center">{{ sp.gia | number }} đ</td>
          <td class="cell-center">{{ sp.tonDau }}</td>
          <td><input type="number" [(ngModel)]="sp.nhapHang" class="input-field"></td>
          <td><input type="number" [(ngModel)]="sp.kiemHang" class="input-field"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="admin-panel" *ngIf="currentTab === 'admin'" style="background: #f9f9f9; padding: 25px; border-radius: 8px; margin-top: 10px;">
    <h3>💰 Tổng kết doanh thu ({{ ngayHienTai }})</h3>
    <div class="card-summary" style="background: white; padding: 20px; border-left: 5px solid #27ae60;">
      <p>Tổng giá trị tồn thực tế:</p>
      <h2 style="color: #27ae60;">{{ tinhTongTien() | number }} VNĐ</h2>
    </div>
    <button (click)="currentTab = 'nhap'" style="margin-top: 20px; cursor: pointer;">⬅️ Quay lại</button>
  </div>
</div>
